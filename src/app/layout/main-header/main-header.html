<a routerLink="/" class="app-c-page-title" aria-label="Back to home">StyleBase</a>
<ul class="u-scrollbar">
  <li><a routerLink="/demo/components" routerLinkActive="active">Components</a></li>
  <li><a routerLink="/demo/layout-grid" routerLinkActive="active">Layout Grid</a></li>
  <li><a routerLink="/demo/icon-system" routerLinkActive="active">Icon System</a></li>
  <li><a routerLink="/demo/scroll-v1" routerLinkActive="active">Scroll Layout v1</a></li>
  <li><a routerLink="/demo/scroll-v2" routerLinkActive="active">Scroll Layout v2</a></li>
  <li><a routerLink="/demo/scroll-v3" routerLinkActive="active">Scroll Layout v3</a></li>
</ul>

<button
  type="button"
  class="app-c-btn app-c-btn-secondary app-c-btn-sm u-ms-auto"
  [attr.aria-label]="theme() === 'dark' ? 'Switch to light theme' : 'Switch to dark theme'"
  (click)="toggleTheme()"
>
  {{ theme() === 'dark' ? 'Light mode' : 'Dark mode' }}
</button>
